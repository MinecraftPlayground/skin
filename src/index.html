<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Skin 3D</title>
    <link rel="stylesheet" href="index.css">
    <script type="module" src="index.js" defer></script>
  </head>
  <body>
    <div class="skin-container">
      <!-- head -->
      <div class="skin head up"></div>
      <div class="skin head down"></div>
      <div class="skin head left"></div>
      <div class="skin head right"></div>
      <div class="skin head front"></div>
      <div class="skin head back"></div>
      <!-- body -->
      <div class="skin body up"></div>
      <div class="skin body down"></div>
      <div class="skin body left"></div>
      <div class="skin body right"></div>
      <div class="skin body front"></div>
      <div class="skin body back"></div>
      <!-- left leg -->
      <div class="skin leg-left up"></div>
      <div class="skin leg-left down"></div>
      <div class="skin leg-left left"></div>
      <div class="skin leg-left right"></div>
      <div class="skin leg-left front"></div>
      <div class="skin leg-left back"></div>
      <!-- right leg -->
      <div class="skin leg-right up"></div>
      <div class="skin leg-right down"></div>
      <div class="skin leg-right left"></div>
      <div class="skin leg-right right"></div>
      <div class="skin leg-right front"></div>
      <div class="skin leg-right back"></div>
      <!-- right arm -->
      <div class="skin arm-right up"></div>
      <div class="skin arm-right down"></div>
      <div class="skin arm-right left"></div>
      <div class="skin arm-right right"></div>
      <div class="skin arm-right front"></div>
      <div class="skin arm-right back"></div>
      <!-- left arm -->
      <div class="skin arm-left up"></div>
      <div class="skin arm-left down"></div>
      <div class="skin arm-left left"></div>
      <div class="skin arm-left right"></div>
      <div class="skin arm-left front"></div>
      <div class="skin arm-left back"></div>
    </div>
    <div class="toggle-skin-parts">
      <label for="head-part"><input type="checkbox" name="head-part" id="head-part" checked> Head</label>
      <label for="body-part"><input type="checkbox" name="body-part" id="body-part" checked> Body</label>
      <label for="leg-left-part"><input type="checkbox" name="leg-left-part" id="leg-left-part" checked> Left Leg</label>
      <label for="leg-right-part"><input type="checkbox" name="leg-right-part" id="leg-right-part" checked> Right Leg</label>
      <label for="arm-left-part"><input type="checkbox" name="arm-left-part" id="arm-left-part" checked> Left Arm</label>
      <label for="arm-right-part"><input type="checkbox" name="arm-right-part" id="arm-right-part" checked> Right Arm</label>
    </div>
  </body>
</html>
