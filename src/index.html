<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Skin 3D</title>
    <link rel="stylesheet" href="index.css">
    <script type="module" src="index.js" defer></script>
  </head>
  <body>
    <div class="skin">
      <div class="skin-part-origin head">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>

      <div class="skin-part-origin body">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>

      <div class="skin-part-origin arm-left">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>

      <div class="skin-part-origin arm-right">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>

      <div class="skin-part-origin leg-left">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>

      <div class="skin-part-origin leg-right">
        <div class="skin-part">
          <div class="skin-part__plane up"></div>
          <div class="skin-part__plane down"></div>
          <div class="skin-part__plane front"></div>
          <div class="skin-part__plane back"></div>
          <div class="skin-part__plane left"></div>
          <div class="skin-part__plane right"></div>
        </div>
      </div>
    </div>
  </body>
</html>
